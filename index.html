<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do You Still Love Me? 💗</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    body {
      font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      opacity: 0.16;
      animation: floatUp linear infinite;
      pointer-events: none;
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh) scale(0.8);
      }
      to {
        transform: translateY(-20vh) scale(1.2);
      }
    }

    .pop-in {
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-purple-900 bg-[linear-gradient(135deg,#fff5fb,#f9f0ff,#fff8fd)]">
  <div id="hearts" class="fixed inset-0 pointer-events-none overflow-hidden"></div>

  <main class="relative w-full max-w-2xl rounded-[2rem] border-[3px] border-pink-200/40 bg-white/90 backdrop-blur-md shadow-[0_12px_30px_rgba(255,126,182,0.25)] p-10 md:p-12 text-center">
    <section class="w-full text-center" id="#firstQuestion">
      <div class="inline-block rounded-full bg-pink-100 px-4 py-2 mb-4 font-bold tracking-wide text-pink-500">
      for my favourite person 💌
    </div>

    <h1 class="text-4xl md:text-5xl font-bold leading-tight mb-3">
      Do you still love me? 🥺💗
    </h1>

    <p class="mx-auto mb-7 max-w-xl text-base md:text-lg leading-relaxed text-purple-700">
      Be very, very honest... but also remember this page was made with extra love, glitter, and dramatic feelings.
    </p>

    <div id="buttonWrap" class="flex flex-wrap justify-center items-center gap-4 min-h-[110px] mt-2">
      <button
        id="yesBtn"
        class="rounded-full px-8 py-4 text-lg font-bold text-white shadow-lg transition duration-300 hover:-translate-y-1 hover:scale-105 bg-gradient-to-r from-pink-400 to-pink-500"
      >
        Yes 💖
      </button>

      <button
        id="noBtn"
        class="rounded-full px-8 py-4 text-lg font-bold text-purple-700 border-2 border-pink-200 bg-white shadow-lg transition duration-300"
      >
        No 🙈
      </button>
    </div>
    </section>
    

    <section id="messageBox" class="mt-6 min-h-[90px] flex flex-col justify-center items-center gap-4"></section>
  </main>

  <script>
    $(function () {
      let noClicks = 0;

      function spawnBackgroundHearts() {
        const icons = ['💗', '💖', '💕', '💘', '✨'];

        for (let i = 0; i < 24; i++) {
          const icon = icons[Math.floor(Math.random() * icons.length)];
          const left = Math.random() * 100;
          const duration = 8 + Math.random() * 10;
          const delay = Math.random() * 8;
          const size = 16 + Math.random() * 18;

          $('#hearts').append(`
            <div
              class="heart"
              style="
                left: ${left}vw;
                font-size: ${size}px;
                animation-duration: ${duration}s;
                animation-delay: ${delay}s;
              "
            >
              ${icon}
            </div>
          `);
        }
      }

      function burstLove() {
        const icons = ['💖', '💘', '💕', '💗', '✨', '🌸'];

        for (let i = 0; i < 28; i++) {
          const icon = icons[Math.floor(Math.random() * icons.length)];
          const left = Math.random() * 100;
          const size = 18 + Math.random() * 22;
          const rotate = Math.random() * 720 - 360;
          const fallDistance = 110 + Math.random() * 20;

          const $piece = $(`
            <div style="
              position: fixed;
              left: ${left}vw;
              top: -10vh;
              font-size: ${size}px;
              pointer-events: none;
              z-index: 999;
              transition: transform 2.4s linear, opacity 2.4s ease;
            ">
              ${icon}
            </div>
          `);

          $('body').append($piece);

          requestAnimationFrame(() => {
            $piece.css({
              transform: `translateY(${fallDistance}vh) rotate(${rotate}deg)`,
              opacity: '0'
            });
          });

          setTimeout(() => {
            $piece.remove();
          }, 2500);
        }
      }

      $('#noBtn').on('click', function () {
        noClicks += 1;

        if (noClicks === 1) {
          $(this)
            .css('transform', 'scale(0.72)')
            .text('No... really? bfr 🥺');
        } else if (noClicks === 2) {
          $(this)
            .css('transform', 'scale(0.46)')
            .text('Still no? 😭');
        } else if (noClicks >= 3) {
          $(this).addClass('hidden');
          $('#yesBtn').text('Yes or Yes 💞');
        }
      });

      $('#yesBtn').on('click', function () {
        $('#firstQuestion').addClass('hidden')
        $('#messageBox').html(`
          <div class="max-w-md rounded-3xl border-2 border-dashed border-pink-200 bg-gradient-to-r from-pink-50 to-purple-50 p-5 shadow-inner">
            <p class="text-[1.04rem] leading-relaxed text-purple-800">
              <strong>Final answer check!</strong><br>
              Confirm right here on the website that you still love me forever and ever?
            </p>
          </div>
          <button
            id="confirmBtn"
            class="rounded-full bg-gradient-to-r from-pink-300 to-pink-500 px-7 py-3 text-base font-bold text-white shadow-lg transition duration-300 hover:-translate-y-1 hover:scale-105"
          >
            Confirm
          </button>
        `);
      });

      $(document).on('click', '#confirmBtn', function () {
        burstLove();

        $('#messageBox').html(`
          <div class="pop-in">
            <div class="mb-3 text-2xl tracking-[0.35em]">✨ 💖 ✨</div>
            <h2 class="text-4xl md:text-6xl font-bold mb-3">cupcakes!!! You said YES!</h2>
            <p class="mx-auto max-w-lg text-base text-purple-700">
              Officially the cutest answer ever. You are stuck with me and all my love now blehhhh
            </p>
            <button
              id="restartBtn"
              class="mt-5 rounded-full bg-gradient-to-r from-pink-300 to-pink-500 px-7 py-3 text-base font-bold text-white shadow-lg transition duration-300 hover:-translate-y-1 hover:scale-105"
            >
              Play Again ♡
            </button>
          </div>
        `);
      });

      $(document).on('click', '#restartBtn', function () {
        location.reload();
      });

      spawnBackgroundHearts();
    });
  </script>
</body>
</html>
