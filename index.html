<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ifeoluwa my orente 💗</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    body {
      font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
      overflow-x: hidden;
    }

    .heart {
      position: absolute;
      opacity: 0.16;
      animation: floatUp linear infinite;
      pointer-events: none;
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh) scale(0.8);
      }
      to {
        transform: translateY(-20vh) scale(1.2);
      }
    }

    .pop-in {
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      from {
        transform: scale(0.85);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-6 sm:px-6 sm:py-8 text-purple-900 bg-gradient-to-br from-pink-50 via-purple-50 to-rose-50">
  <div id="hearts" class="fixed inset-0 pointer-events-none overflow-hidden"></div>

  <main class="glass-card relative w-full max-w-2xl rounded-[28px] sm:rounded-[34px] border border-pink-200/60 shadow-[0_12px_30px_rgba(255,126,182,0.20)] px-5 py-7 sm:px-8 sm:py-10 md:px-12 md:py-12 text-center">
    <section class="w-full text-center" id="firstQuestion">
      <div class="inline-block rounded-full bg-pink-100 px-4 py-2 mb-4 text-sm sm:text-base font-bold tracking-wide text-pink-500 shadow-sm">
        For my best friend and my orente
      </div>

      <h1 class="text-[2rem] leading-tight sm:text-5xl font-bold mb-3 sm:mb-4">
        Do you still love me, orente? 💗
      </h1>

      <p class="mx-auto mb-7 max-w-xl text-[15px] leading-7 sm:text-lg sm:leading-relaxed text-purple-700 px-1">
        Before you answer, remember this page was made with extra love, glitter, and dramatic feelings. This is just a reminder that I would do anything for you.
      </p>

      <div id="buttonWrap" class="flex flex-col sm:flex-row justify-center items-center gap-3 sm:gap-4 min-h-[120px] mt-2">
        <button
          id="yesBtn"
          class="w-full sm:w-auto rounded-full px-8 py-4 text-base sm:text-lg font-bold text-white shadow-lg transition duration-300 hover:-translate-y-1 hover:scale-105 bg-gradient-to-r from-pink-400 via-rose-400 to-pink-500"
        >
          Yes 💖
        </button>

        <button
          id="noBtn"
          class="w-full sm:w-auto rounded-full px-8 py-4 text-base sm:text-lg font-bold text-purple-700 border-2 border-pink-200 bg-white shadow-lg transition duration-300"
        >
          No 🙈
        </button>
      </div>
    </section>

    <section id="messageBox" class="mt-6 min-h-[100px] flex flex-col justify-center items-center gap-4"></section>
  </main>

  <script>
    $(function () {
      let noClicks = 0;

      function spawnBackgroundHearts() {
        const icons = ['💗', '💖', '💕', '💘', '✨', '🌸'];

        for (let i = 0; i < 24; i++) {
          const icon = icons[Math.floor(Math.random() * icons.length)];
          const left = Math.random() * 100;
          const duration = 8 + Math.random() * 10;
          const delay = Math.random() * 8;
          const size = 14 + Math.random() * 16;

          $('#hearts').append(`
            <div
              class="heart"
              style="
                left: ${left}vw;
                font-size: ${size}px;
                animation-duration: ${duration}s;
                animation-delay: ${delay}s;
              "
            >
              ${icon}
            </div>
          `);
        }
      }

      function burstLove() {
        const icons = ['💖', '💘', '💕', '💗', '✨', '🌸'];

        for (let i = 0; i < 28; i++) {
          const icon = icons[Math.floor(Math.random() * icons.length)];
          const left = Math.random() * 100;
          const size = 18 + Math.random() * 18;
          const rotate = Math.random() * 720 - 360;
          const fallDistance = 110 + Math.random() * 20;

          const $piece = $(`
            <div style="
              position: fixed;
              left: ${left}vw;
              top: -10vh;
              font-size: ${size}px;
              pointer-events: none;
              z-index: 999;
              transition: transform 2.4s linear, opacity 2.4s ease;
            ">
              ${icon}
            </div>
          `);

          $('body').append($piece);

          requestAnimationFrame(() => {
            $piece.css({
              transform: `translateY(${fallDistance}vh) rotate(${rotate}deg)`,
              opacity: '0'
            });
          });

          setTimeout(() => {
            $piece.remove();
          }, 2500);
        }
      }

      $('#noBtn').on('click', function () {
        noClicks += 1;

        if (noClicks === 1) {
          $(this)
            .css('transform', 'scale(0.78)')
            .text('No... really? 🥺');
        } else if (noClicks === 2) {
          $(this)
            .css('transform', 'scale(0.52)')
            .text('Still no? 😭');
        } else if (noClicks >= 3) {
          $(this).addClass('hidden');
          $('#yesBtn').text('Yes or Yes 💞');
        }
      });

      $('#yesBtn').on('click', function () {
        $('#firstQuestion').addClass('hidden');
        $('#messageBox').html(`
          <div class="w-full max-w-md rounded-[24px] border-2 border-dashed border-pink-200 bg-gradient-to-br from-pink-50 via-white to-purple-50 p-5 sm:p-6 shadow-inner">
            <p class="text-base sm:text-[1.08rem] leading-7 text-purple-800">
              <strong>Final answer check!</strong><br>
              Confirm right here on the website that you still love me forever and ever?
            </p>
          </div>
          <button
            id="confirmBtn"
            class="w-full sm:w-auto rounded-full bg-gradient-to-r from-pink-300 via-rose-400 to-pink-500 px-8 py-4 text-base sm:text-lg font-bold text-white shadow-lg transition duration-300 hover:-translate-y-1 hover:scale-105"
          >
            Confirm 💌
          </button>
        `);
      });

      $(document).on('click', '#confirmBtn', function () {
        burstLove();

        $('#messageBox').html(`
          <div class="pop-in w-full">
            <div class="mb-3 text-xl sm:text-2xl tracking-[0.25em] sm:tracking-[0.35em]">✨ 💖 ✨</div>
            <h2 class="text-3xl leading-tight sm:text-5xl md:text-6xl font-bold mb-3 text-pink-500">
              Cupcakes!!! You said YES! 🎀
            </h2>
            <p class="mx-auto max-w-lg text-[15px] leading-7 sm:text-base text-purple-700 px-2">
              Officially the cutest answer ever. You are stuck with me and all my love now, blehhhh 💞
            </p>
            <button
              id="restartBtn"
              class="mt-5 w-full sm:w-auto rounded-full bg-gradient-to-r from-pink-300 via-rose-400 to-pink-500 px-8 py-4 text-base sm:text-lg font-bold text-white shadow-lg transition duration-300 hover:-translate-y-1 hover:scale-105"
            >
              Play Again ♡
            </button>
          </div>
        `);
      });

      $(document).on('click', '#restartBtn', function () {
        location.reload();
      });

      spawnBackgroundHearts();
    });
  </script>
</body>
</html>
